<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>條碼比對</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align:center; padding:20px; }
#reader { width:320px; margin:auto; }
.box { margin-top:15px; font-size:16px; word-break:break-all; }
.result { font-size:22px; margin-top:20px; font-weight:bold; }
button { padding:12px 20px; font-size:18px; border-radius:8px; }
</style>
</head>

<body>

<h2>條碼 / QR 比對</h2>

<button onclick="start()">開始掃描</button>

<div id="reader"></div>

<div class="box">第一組：<span id="a">-</span></div>
<div class="box">第二組：<span id="b">-</span></div>

<div class="result" id="result"></div>

<script>
let first = null;
let second = null;
let last = "";
let lock = false;
let scanner;

function start() {
  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    scanner.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      onScan
    );
  });
}

function onScan(text) {
  if (lock) return;
  if (text === last) return;

  lock = true;
  last = text;

  setTimeout(() => lock = false, 1000);

  if (!first) {
    first = text;
    document.getElementById("a").innerText = text;
    document.getElementById("result").innerText = "請掃第二個";
    return;
  }

  if (!second) {
    second = text;
    document.getElementById("b").innerText = text;

    fetch("/api/compare", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        firstCode: first,
        secondCode: second
      })
    })
    .then(r => r.json())
    .then(d => {
      document.getElementById("result").innerText = d.message;

      setTimeout(reset, 3000);
    });
  }
}

function reset() {
  first = null;
  second = null;
  last = "";

  document.getElementById("a").innerText = "-";
  document.getElementById("b").innerText = "-";
  document.getElementById("result").innerText = "";
}
</script>

</body>
</html>
