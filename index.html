<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARCODE MATCH v1.0.2</title>
    <script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --primary-color: #58a6ff;
            --success-color: #3fb950;
            --error-color: #f85149;
            --text-color: #c9d1d9;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .version {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: #8b949e;
            z-index: 100;
        }

        header { padding: 20px; text-align: center; width: 100%; }
        h1 { font-size: 1.2rem; margin: 0; color: var(--primary-color); letter-spacing: 1px; }

        .steps {
            display: flex;
            justify-content: space-around;
            width: 90%;
            margin-bottom: 15px;
        }
        .step {
            font-size: 13px;
            padding: 5px 10px;
            border-bottom: 2px solid #30363d;
            color: #8b949e;
        }
        .step.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        #scanner-container {
            position: relative;
            width: 320px;
            height: 240px; 
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #30363d;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-region-highlight {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 0 500px rgba(0, 0, 0, 0.7);
            z-index: 10;
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary-color);
            box-shadow: 0 0 8px var(--primary-color);
            animation: scan 1.5s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .controls {
            width: 90%;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select, button {
            background: var(--surface-color);
            color: var(--text-color);
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            -webkit-appearance: none; /* iPhone Safari 下拉選單樣式修正 */
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-start { background: #238636; color: white; }
        .btn-stop { background: #da3633; color: white; }

        .result-area {
            width: 90%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card {
            background: var(--surface-color);
            padding: 10px;
            border-radius: 6px;
            min-height: 60px;
            font-size: 12px;
            border: 1px solid #30363d;
            word-break: break-all;
        }

        .card-label { font-size: 11px; color: #8b949e; margin-bottom: 5px; display: block; }
        #match-status { font-size: 2rem; font-weight: bold; margin: 10px 0; text-align: center; }
        .match { color: var(--success-color); }
        .no-match { color: var(--error-color); }

        .tabs { width: 90%; display: flex; margin-top: 10px; }
        .tab { flex: 1; text-align: center; padding: 10px; background: var(--surface-color); cursor: pointer; border: 1px solid #30363d; }
        .tab.active { background: #21262d; border-bottom: 2px solid var(--primary-color); }

        .hidden { display: none !important; }
        .input-manual { width: 90%; padding: 15px 0; display: flex; flex-direction: column; gap: 10px; }
        input { background: var(--surface-color); border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="version">v1.0.2</div>

    <header>
        <h1>BARCODE MATCH</h1>
    </header>

    <div class="steps">
        <div id="step1" class="step active">1. 掃第一組</div>
        <div id="step2" class="step">2. 掃第二組</div>
        <div id="step3" class="step">3. 比對結果</div>
    </div>

    <div class="tabs">
        <div id="tab-scan" class="tab active" onclick="switchTab('scan')">相機掃描</div>
        <div id="tab-manual" class="tab" onclick="switchTab('manual')">手動輸入</div>
    </div>

    <div id="mode-scan" class="ui-mode">
        <div id="scanner-container">
            <video id="video" playsinline muted></video>
            <div class="scan-region-highlight">
                <div class="scan-line"></div>
            </div>
        </div>

        <div class="controls">
            <select id="videoSource"></select>
            <div class="btn-group">
                <button class="btn-start" onclick="startScanner()">啟動</button>
                <button class="btn-stop" onclick="stopScanner()">停止</button>
                <button onclick="resetSystem()">重置</button>
            </div>
        </div>
    </div>

    <div id="mode-manual" class="ui-mode hidden">
        <div class="input-manual">
            <input type="text" id="m-input1" placeholder="輸入第一組條碼">
            <input type="text" id="m-input2" placeholder="輸入第二組條碼">
            <button onclick="manualCompare()" style="background: var(--primary-color); color:white;">執行比對</button>
        </div>
    </div>

    <div class="result-area">
        <div class="card">
            <span class="card-label">結果 A</span>
            <div id="res-a">等待中...</div>
        </div>
        <div class="card">
            <span class="card-label">結果 B</span>
            <div id="res-b">等待中...</div>
        </div>
    </div>

    <div id="match-display" class="hidden">
        <div id="match-status"></div>
        <div style="text-align:center; font-size: 14px; color: #8b949e; padding-bottom: 20px;">
            A: <span id="val-a"></span><br>
            B: <span id="val-b"></span>
        </div>
    </div>

    <script>
        let selectedDeviceId;
        let codeReader = null;
        let scanCount = 0;
        let resultA = null;
        let resultB = null;

        const videoSelect = document.getElementById('videoSource');

        // 改進版設備初始化
        async function initDevices() {
            try {
                // iPhone 要求必須先請求權限，後續列舉設備才會有名稱
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                // 拿到權限後立刻關閉，避免佔用
                stream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                videoSelect.innerHTML = '';
                let backCameraId = null;

                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    const label = device.label || `Camera ${index + 1}`;
                    option.text = label;
                    
                    // 檢查是否為後置鏡頭
                    const isBack = /back|rear|environment|後/i.test(label);
                    if (isBack) {
                        backCameraId = device.deviceId;
                        option.selected = true;
                    }
                    videoSelect.appendChild(option);
                });

                // 如果沒找到關鍵字，通常 iPhone 的主鏡頭（後置）是列表的最後一個
                if (!backCameraId && videoDevices.length > 0) {
                    selectedDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                    videoSelect.value = selectedDeviceId;
                } else {
                    selectedDeviceId = backCameraId || (videoDevices[0] ? videoDevices[0].deviceId : null);
                }

                console.log("選擇的鏡頭 ID:", selectedDeviceId);
            } catch (err) {
                console.error(err);
                alert("無法初始化相機，請確認 Safari 權限設定");
            }
        }

        videoSelect.onchange = () => {
            selectedDeviceId = videoSelect.value;
            if (codeReader) {
                stopScanner();
                startScanner();
            }
        };

        async function launchReader() {
            // 每次重新建立全新的 Reader 實例，確保不留快取
            codeReader = new ZXing.BrowserMultiFormatReader();
            
            const hints = new Map();
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                ZXing.BarcodeFormat.QR_CODE,
                ZXing.BarcodeFormat.CODE_128,
                ZXing.BarcodeFormat.CODE_39
            ]);
            hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
            codeReader.hints = hints;

            try {
                const result = await codeReader.decodeOnceFromVideoDevice(selectedDeviceId, 'video');
                handleScanResult(result.text);
            } catch (err) {
                if (err && err.name !== 'NotFoundException') {
                    console.error("掃描錯誤:", err);
                }
            }
        }

        function handleScanResult(text) {
            vibrate(60);
            const partNo = extractPartNumber(text);
            
            if (scanCount === 0) {
                resultA = partNo;
                document.getElementById('res-a').innerText = text;
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                scanCount = 1;
                stopScanner();
                setTimeout(launchReader, 500); 
            } else if (scanCount === 1) {
                resultB = partNo;
                document.getElementById('res-b').innerText = text;
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                scanCount = 2;
                stopScanner();
                compareResults();
            }
        }

        function extractPartNumber(raw) {
            if (raw.includes('{')) {
                const parts = raw.split('{');
                return parts.length > 1 ? parts[1].trim() : raw.trim();
            }
            return raw.trim();
        }

        function compareResults() {
            const display = document.getElementById('match-display');
            const status = document.getElementById('match-status');
            display.classList.remove('hidden');
            
            document.getElementById('val-a').innerText = resultA;
            document.getElementById('val-b').innerText = resultB;

            if (resultA === resultB) {
                status.innerText = "MATCH";
                status.className = "match";
                vibrate([60, 100, 60]);
            } else {
                status.innerText = "NO MATCH";
                status.className = "no-match";
                vibrate([60, 100, 60, 100, 60]);
            }

            setTimeout(resetSystem, 3000);
        }

        function startScanner() {
            if (!selectedDeviceId) {
                initDevices().then(() => {
                    if (selectedDeviceId) launchReader();
                });
            } else {
                launchReader();
            }
        }

        function stopScanner() {
            if (codeReader) {
                codeReader.reset();
                codeReader = null;
            }
            const video = document.getElementById('video');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        function resetSystem() {
            stopScanner();
            scanCount = 0;
            resultA = null;
            resultB = null;
            document.getElementById('res-a').innerText = "等待中...";
            document.getElementById('res-b').innerText = "等待中...";
            document.getElementById('match-display').classList.add('hidden');
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.remove('active');
            
            if (!document.getElementById('mode-scan').classList.contains('hidden')) {
                startScanner();
            }
        }

        function switchTab(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.ui-mode').forEach(m => m.classList.add('hidden'));
            
            if (mode === 'scan') {
                document.getElementById('tab-scan').classList.add('active');
                document.getElementById('mode-scan').classList.remove('hidden');
                startScanner();
            } else {
                document.getElementById('tab-manual').classList.add('active');
                document.getElementById('mode-manual').classList.remove('hidden');
                stopScanner();
            }
        }

        function manualCompare() {
            const in1 = document.getElementById('m-input1').value;
            const in2 = document.getElementById('m-input2').value;
            if (!in1 || !in2) return alert("請輸入完整條碼內容");
            
            resultA = extractPartNumber(in1);
            resultB = extractPartNumber(in2);
            document.getElementById('res-a').innerText = in1;
            document.getElementById('res-b').innerText = in2;
            compareResults();
        }

        function vibrate(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        window.addEventListener('load', initDevices);
    </script>
</body>
</html>
