<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>條碼比對系統</title>
<script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #00d9ff;
    --accent2: #ff6b35;
    --success: #22c55e;
    --error: #ef4444;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .header {
    text-align: center;
    padding: 20px 0 16px;
  }
  .header h1 {
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .mode-switch {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: bold;
  }

  .scanner-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
  }
  #video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
  }
  #video-container video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 160px;
    height: 160px;
    position: relative;
    border: 3px solid var(--accent);
    border-radius: 8px;
  }
  .scan-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s infinite;
    top: 0;
  }
  @keyframes scanline {
    0% { top: 0; opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .scanner-status {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .status-dot.success { background: var(--success); }
  .status-dot.error { background: var(--error); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: bold;
  }
  .btn.danger { color: var(--error); border-color: var(--error); }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .step-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    font-size: 13px;
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    border: 2px solid var(--border);
    color: var(--text-muted);
  }
  .step-num.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .step-num.done {
    background: var(--success);
    border-color: var(--success);
    color: #000;
  }

  .scan-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .scan-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }
  .scan-card.has-value { border-color: var(--success); }
  .scan-card-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .scan-card-value {
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
    min-height: 20px;
  }
  .scan-card-value.empty {
    color: var(--text-muted);
    font-style: italic;
  }

  .result-box {
    padding: 16px;
    border-radius: var(--radius);
    text-align: center;
    margin-bottom: 12px;
    border: 2px solid transparent;
    display: none;
  }
  .result-box.show { display: block; }
  .result-box.match {
    background: rgba(34,197,94,0.1);
    border-color: var(--success);
  }
  .result-box.no-match {
    background: rgba(239,68,68,0.1);
    border-color: var(--error);
  }
  .result-icon { font-size: 36px; margin-bottom: 8px; }
  .result-text { font-size: 18px; font-weight: bold; letter-spacing: 2px; }
  .result-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .manual-section {
    display: none;
  }
  .manual-section.show { display: block; }
  .input-group {
    margin-bottom: 12px;
  }
  .input-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .input-field {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    outline: none;
  }
  .input-field:focus { border-color: var(--accent); }

  .history-section {
    margin-top: 8px;
  }
  .history-title {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .history-item.match { border-left: 3px solid var(--success); }
  .history-item.no-match { border-left: 3px solid var(--error); }
  .history-codes { color: var(--text-muted); flex: 1; }
  .history-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .history-badge.match { background: rgba(34,197,94,0.2); color: var(--success); }
  .history-badge.no-match { background: rgba(239,68,68,0.2); color: var(--error); }
  .history-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

  .cam-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
    gap: 12px;
  }

  #camera-select {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>BARCODE MATCH</h1>
  <p>條碼 / QR CODE 比對系統</p>
  <div style="position:fixed;top:16px;right:16px;font-size:11px;color:var(--text-muted);letter-spacing:1px;">v1.0.0</div>
</div>

<div class="mode-switch">
  <button class="mode-btn active" id="btn-cam" onclick="switchMode('camera')">📷 相機掃描</button>
  <button class="mode-btn" id="btn-manual" onclick="switchMode('manual')">⌨️ 手動輸入</button>
</div>

<!-- ========== 相機模式 ========== -->
<div id="camera-section">
  <select id="camera-select" onchange="changeCamera()">
    <option value="">— 載入相機清單 —</option>
  </select>

  <div class="scanner-wrap">
    <div id="video-container">
      <div class="cam-placeholder" id="cam-placeholder">
        <span>📷</span>
        <span>點擊「啟動相機」開始</span>
      </div>
    </div>
    <div class="scanner-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">未啟動</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="btn-start" onclick="startCamera()">啟動相機</button>
    <button class="btn danger" id="btn-stop" onclick="stopCamera()" disabled>停止</button>
    <button class="btn" onclick="resetScan()">重置</button>
  </div>

  <div class="step-indicator">
    <div class="step-num" id="step1">1</div>
    <span style="flex:1;text-align:center;">掃第一個</span>
    <div class="step-num" id="step2">2</div>
    <span style="flex:1;text-align:center;">掃第二個</span>
    <div class="step-num" id="step3">3</div>
    <span style="flex:1;text-align:center;">比對結果</span>
  </div>

  <div class="scan-cards">
    <div class="scan-card">
      <div class="scan-card-label">第一組</div>
      <div class="scan-card-value empty" id="val-a">等待掃描</div>
    </div>
    <div class="scan-card">
      <div class="scan-card-label">第二組</div>
      <div class="scan-card-value empty" id="val-b">等待掃描</div>
    </div>
  </div>
</div>

<!-- ========== 手動輸入模式 ========== -->
<div class="manual-section" id="manual-section">
  <div class="input-group">
    <label class="input-label">第一組條碼</label>
    <input class="input-field" id="input-a" type="text" placeholder="輸入或貼上條碼內容" autocomplete="off">
  </div>
  <div class="input-group">
    <label class="input-label">第二組條碼</label>
    <input class="input-field" id="input-b" type="text" placeholder="輸入或貼上條碼內容" autocomplete="off">
  </div>
  <div class="btn-row">
    <button class="btn primary" onclick="manualCompare()">執行比對</button>
    <button class="btn" onclick="clearManual()">清除</button>
  </div>
</div>

<!-- 比對結果 -->
<div class="result-box" id="result-box">
  <div class="result-icon" id="result-icon">✓</div>
  <div class="result-text" id="result-text">MATCH</div>
  <div class="result-sub" id="result-sub"></div>
</div>

<!-- 歷史記錄 -->
<div class="history-section">
  <div class="history-title">📋 比對記錄</div>
  <div class="history-list" id="history-list">
    <div style="text-align:center;color:var(--text-muted);padding:12px;">尚無記錄</div>
  </div>
</div>

<script>
// =====================
// 全域狀態
// =====================
let codeReader = null;
let firstCode = null;
let lastScanned = '';
let lastScannedTime = 0;
let history = [];

// =====================
// 工具函式
// =====================
// 從 QR 內容提取料號
function extractPartNo(text) {
  if (!text) return '';
  text = text.trim();
  
  // ERP QR：YP31-26030018{10CP00001N-0003{3000...
  if (text.includes('{')) {
    const parts = text.split('{');
    return parts[1].trim();
  }
  
  // 純料號
  return text;
}

// 比對兩個條碼
function compare(a, b) {
  const partNoA = extractPartNo(a);
  const partNoB = extractPartNo(b);
  return partNoA === partNoB && partNoA !== '';
}

// 設定狀態顯示
function setStatus(type, msg) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
  txt.textContent = msg;
}

// 設定步驟指示
function setStep(step) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step' + i);
    if (i < step) el.className = 'step-num done';
    else if (i === step) el.className = 'step-num active';
    else el.className = 'step-num';
  }
}

// =====================
// 模式切換
// =====================
function switchMode(mode) {
  const isCamera = mode === 'camera';
  document.getElementById('btn-cam').classList.toggle('active', isCamera);
  document.getElementById('btn-manual').classList.toggle('active', !isCamera);
  document.getElementById('camera-section').style.display = isCamera ? 'block' : 'none';
  document.getElementById('manual-section').classList.toggle('show', !isCamera);
  if (!isCamera) stopCamera();
}

// =====================
// 相機啟動
// =====================
async function startCamera() {
  resetScan();
  setStatus('active', '初始化中...');
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;

  try {
    // 請求權限
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    stream.getTracks().forEach(t => t.stop());

    // 列舉相機
    const devices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    if (!devices.length) throw new Error('找不到相機');

    const sel = document.getElementById('camera-select');
    sel.innerHTML = '';
    devices.forEach((d, i) => {
      const opt = document.createElement('option');
      opt.value = d.deviceId;
      opt.text = d.label || `相機 ${i + 1}`;
      sel.appendChild(opt);
    });

    const back = devices.find(d => /back|rear|environment/i.test(d.label));
    const chosen = (back || devices[devices.length - 1]).deviceId;
    sel.value = chosen;

    await launchReader(chosen);
  } catch (err) {
    const msg = err.name === 'NotAllowedError' ? '請允許相機權限' : err.message;
    setStatus('error', msg);
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
  }
}

async function launchReader(deviceId) {
  const container = document.getElementById('video-container');
  document.getElementById('cam-placeholder').style.display = 'none';

  // 建立 video
  let video = container.querySelector('video');
  if (!video) {
    video = document.createElement('video');
    video.setAttribute('playsinline', '');
    video.setAttribute('autoplay', '');
    video.setAttribute('muted', '');
    video.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    container.insertBefore(video, container.firstChild);
  }

  // 掃描框
  let overlay = container.querySelector('.scan-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'scan-overlay';
    overlay.innerHTML = '<div class="scan-frame"><div class="scan-line"></div></div>';
    container.appendChild(overlay);
  }

  // ZXing 設定
  const hints = new Map([
    [ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
    ]],
    [ZXing.DecodeHintType.TRY_HARDER, true],
  ]);

  codeReader = new ZXing.BrowserMultiFormatReader(hints, 500);
  setStatus('active', '請掃第一個條碼');

  try {
    await codeReader.decodeFromVideoDevice(deviceId, video, (result) => {
      if (!result) return;
      
      const text = result.getText();
      const now = Date.now();

      // 防重複：同一個碼 1.5 秒內不重複
      if (text === lastScanned && now - lastScannedTime < 1500) return;

      lastScanned = text;
      lastScannedTime = now;
      onScan(text);
    });
  } catch (err) {
    setStatus('error', err.message);
  }
}

function changeCamera() {
  const deviceId = document.getElementById('camera-select').value;
  if (deviceId && codeReader) {
    stopCamera();
    setTimeout(() => launchReader(deviceId), 500);
  }
}

function stopCamera() {
  if (codeReader) {
    try { codeReader.reset(); } catch(e) {}
    codeReader = null;
  }

  const container = document.getElementById('video-container');
  const video = container.querySelector('video');
  if (video) {
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
  }

  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  setStatus('', '已停止');
}

// =====================
// 掃描邏輯
// =====================
function onScan(text) {
  if (navigator.vibrate) navigator.vibrate(60);

  if (!firstCode) {
    firstCode = text;
    document.getElementById('val-a').textContent = text;
    document.getElementById('val-a').classList.remove('empty');
    setStep(2);
    setStatus('active', '✓ 請掃第二個');
  } else {
    document.getElementById('val-b').textContent = text;
    document.getElementById('val-b').classList.remove('empty');
    setStep(3);

    const isMatch = compare(firstCode, text);
    showResult(isMatch, firstCode, text);
    addHistory(firstCode, text, isMatch);

    if (isMatch) {
      setStatus('success', '✓ 相符');
      if (navigator.vibrate) navigator.vibrate([60, 50, 60]);
    } else {
      setStatus('error', '✗ 不符');
      if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
    }

    setTimeout(() => {
      resetScan();
      setStatus('active', '請掃第一個條碼');
    }, 3500);
  }
}

function showResult(isMatch, a, b) {
  const box = document.getElementById('result-box');
  box.className = 'result-box show ' + (isMatch ? 'match' : 'no-match');
  document.getElementById('result-icon').textContent = isMatch ? '✓' : '✗';
  document.getElementById('result-text').textContent = isMatch ? 'MATCH ─ 相符' : 'NO MATCH ─ 不符';
  
  if (isMatch) {
    document.getElementById('result-sub').textContent = `料號：${extractPartNo(a)}`;
  } else {
    const pnA = extractPartNo(a);
    const pnB = extractPartNo(b);
    document.getElementById('result-sub').textContent = `A: ${pnA} vs B: ${pnB}`;
  }
}

function resetScan() {
  firstCode = null;
  lastScanned = '';
  lastScannedTime = 0;
  
  document.getElementById('val-a').textContent = '等待掃描';
  document.getElementById('val-a').classList.add('empty');
  document.getElementById('val-b').textContent = '等待掃描';
  document.getElementById('val-b').classList.add('empty');
  document.getElementById('result-box').className = 'result-box';
  setStep(1);
}

// =====================
// 手動輸入
// =====================
function manualCompare() {
  const a = document.getElementById('input-a').value.trim();
  const b = document.getElementById('input-b').value.trim();
  if (!a || !b) { alert('請輸入兩組條碼'); return; }

  const isMatch = compare(a, b);
  showResult(isMatch, a, b);
  addHistory(a, b, isMatch);
}

function clearManual() {
  document.getElementById('input-a').value = '';
  document.getElementById('input-b').value = '';
  document.getElementById('result-box').className = 'result-box';
}

// =====================
// 歷史記錄
// =====================
function addHistory(a, b, isMatch) {
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  history.unshift({ a, b, isMatch, time });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:12px;">尚無記錄</div>';
    return;
  }
  list.innerHTML = history.map(h => `
    <div class="history-item ${h.isMatch ? 'match' : 'no-match'}">
      <span class="history-codes">${extractPartNo(h.a)}</span>
      <span class="history-badge ${h.isMatch ? 'match' : 'no-match'}">${h.isMatch ? 'OK' : 'NG'}</span>
      <span class="history-time">${h.time}</span>
    </div>
  `).join('');
}

// 初始化
setStep(1);
</script>
</body>
</html>
